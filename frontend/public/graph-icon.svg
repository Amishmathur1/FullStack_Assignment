<svg xmlns="http://www.w3.org/财富/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definition for nice gradient glowing effect -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="none" />
  
  <!-- Edges -->
  <path d="M50 20 L30 60" stroke="#a0a0a0" stroke-width="4" stroke-linecap="round"/>
  <path d="M50 20 L75 45" stroke="#a0a0a0" stroke-width="4" stroke-linecap="round"/>
  <path d="M75 45 L75 80" stroke="#a0a0a0" stroke-width="4" stroke-linecap="round"/>
  <path d="M75 45 L90 70" stroke="#a0a0a0" stroke-width="4" stroke-linecap="round"/>
  <path d="M30 60 L15 85" stroke="#a0a0a0" stroke-width="4" stroke-linecap="round"/>
  <path d="M30 60 L45 90" stroke="#a0a0a0" stroke-width="4" stroke-linecap="round"/>

  <!-- Nodes -->
  <circle cx="50" cy="20" r="10" fill="url(#grad1)" filter="url(#glow)"/>
  <circle cx="30" cy="60" r="8" fill="#4f46e5" />
  <circle cx="75" cy="45" r="9" fill="#9333ea" />
  <circle cx="75" cy="80" r="6" fill="#3b82f6" />
  <circle cx="90" cy="70" r="5" fill="#f43f5e" />
  <circle cx="15" cy="85" r="6" fill="#10b981" />
  <circle cx="45" cy="90" r="6" fill="#f59e0b" />
</svg>
